<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Fit Tracker</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

header {
  background: #22c55e;
  padding: 15px;
  text-align: center;
  font-size: 22px;
}

.container {
  padding: 15px;
}

.day {
  margin-bottom: 20px;
  padding: 15px;
  background: #1e293b;
  border-radius: 10px;
}

.exercise {
  margin: 10px 0;
  padding: 10px;
  background: #334155;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>💪 My Fit Tracker</header>

<div class="container" id="app"></div>

<script>

const workouts = [
  { day: "Day 1", exercises: ["Squat", "Push Ups", "Rows", "Shoulder Press"] },
  { day: "Day 2", exercises: ["Deadlift", "Chest Press", "Lat Pulldown", "Lateral Raises"] },
  { day: "Day 3", exercises: ["Lunges", "Incline Press", "Rows", "Arnold Press"] },
  { day: "Day 4", exercises: ["Squat", "Push Ups", "Rows", "Shoulder Press"] }
];

const app = document.getElementById("app");

workouts.forEach(day => {
  const div = document.createElement("div");
  div.className = "day";
  div.innerHTML = `<h3>${day.day}</h3>`;

  day.exercises.forEach(ex => {
    const exDiv = document.createElement("div");
    exDiv.className = "exercise";
    exDiv.innerHTML = `<strong>${ex}</strong>`;
    div.appendChild(exDiv);
  });

  app.appendChild(div);
});

</script>

</body>
</html>
